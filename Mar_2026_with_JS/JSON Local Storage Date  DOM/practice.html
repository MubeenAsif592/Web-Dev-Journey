<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice excercise</title>
    <style>
        #my-button{
            height: 50px;
            width: 50px;
            font-size: 30px;
            border: none;
            border-radius: 5px;
        }
        .js-odd{
            background-color: chocolate;
        }
        .js-even{
            background-color: lawngreen;
        }
    </style>
</head>
<body>
<h3 id="greeting">Good Morning Mubeen</h3>
<button id="my-button" onclick="buttonPressed();"></button>

<script>
    let noOfTimeClicked = localStorage.getItem('noOfTimesClicked') || 0;
  
    function buttonPressed(){
        noOfTimeClicked++;
        localStorage.setItem('noOfTimesClicket' ,noOfTimeClicked);
        updateButton();
    }
    function updateButton(){
        let button = document.querySelector('#my-button');
        if (noOfTimeClicked % 2 === 0){
            button.classList.remove('js-odd');
            button.classList.add('js-even');
        }
        else{
            button.classList.remove('js-even');
            button.classList.add('js-odd');
        }
        
        button.innerText = noOfTimeClicked;
    }
    updateButton();
</script>
</body>
</html>
