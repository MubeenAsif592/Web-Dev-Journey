<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="circket-with-json.css">
    <title>Cricket Game</title>
</head>
<body>
    <h1>Bat Ball Stump Game</h1>
    <script>
        let randommNumber;
        let commputerChoice;
        let resultMsg;
    </script>

    
    <button class="choice-button" onclick="
    console.log('You have chosen Bat');
    commputerChoice = generateComputerChoice();
    resultMsg = getResult('Bat', commputerChoice);
    showResult('Bat',commputerChoice,resultMsg);
    ">
        <img src="images/bat.jpeg" alt="Bat image" class="choice-image">
    </button>

    <button class="choice-button" onclick="
    console.log('You have chosen Ball');
    commputerChoice = generateComputerChoice();
    resultMsg =getResult('Ball', commputerChoice);

    showResult('Ball',commputerChoice,resultMsg);
    ">
        <img src="images/Ball.jpg" alt="Ball image" class="choice-image">
    </button>


    <button class="choice-button"
    onclick="
    console.log('You have chosen Stump');
    commputerChoice = generateComputerChoice();
    resultMsg = getResult('Stump',commputerChoice);
    showResult('Stump',commputerChoice,resultMsg);
    ">
       <img src="images/wicket.jpeg" alt="Stump image" class="choice-image">
    </button>

   

    <h3 id="user-move"></h3>
    <h3 id="computer-move"></h3>
    <h3 id="result"></h3>
    <h3 id="score"></h3>

     <button onclick="localStorage.clear(), resetScore() , showResult();">Reset</button>
    <script>
        let scoreStr = localStorage.getItem('score');
        let score;
        resetScore(scoreStr);

        function resetScore(scoreStr){
            score = scoreStr ? JSON.parse(scoreStr) : {
            win: 0, 
            lost: 0,
            tie: 0,
            
        };
        score.displayScore = function(){
                return ` Won: ${score.win}, Lost: ${score.lost}, Tie: ${score.tie}`;
            };
        }

        showResult();
        
        function generateComputerChoice (){
             //This will generate random number b/w 0 and 3
            randommNumber=Math.random() * 3;
            if(randommNumber>0 && randommNumber<=1){
                return 'Bat';
            }
            else if(randommNumber > 1 && randommNumber <= 2){
                return 'Ball';
            }
            else{
                return 'Stump';
            }
        }

        function getResult(userMove, computerMove){
           if (userMove === 'Bat'){
             if(computerMove === 'Ball'){
                score.win++;
                return 'User Won';
             }
             else if (computerMove === 'Bat'){
                score.tie++;
                return `It's a tie`;
             }
             else if(computerMove === 'Stump'){
                score.lost++;
                return 'Computer has won';
             }
           }
           else if(userMove === 'Ball'){
              if(computerMove === 'Ball'){
                    score.tie++;
                    return (`It's a tie`);
                }
                else if(computerMove === 'Bat'){
                    score.lost++;
                    return ('Computer has won');
                }
                else if(computerMove === 'Stump'){
                    score.win++;
                    return ('User Won');
                }
           }
           else{
                 if(computerMove === 'Ball'){
                    score.win++;
                     return ('User Won');
                }
                else if(computerMove === 'Bat'){
                    score.tie++;
                    return (`It's  a tie`);
                }
                else if(computerMove === 'Stump'){
                    score.lost++; 
                    return ('Computer has won');
                }
           }
        }

        function showResult(userMove,computerMove, result){
              // user json.stringfy()
              localStorage.setItem('score',JSON.stringify(score));
                // undefined removal will not affect of this code
              document.querySelector('#user-move').innerText = userMove /*!== undefined*/ ? `You have chosen ${userMove}` : '';

              document.querySelector('#computer-move').innerText = computerMove ? `Computer choice is ${computerMove}` : '';
                // no need for the turnery operator in below code, as if we use or operator it work as it is
              document.querySelector('#result').innerText = result /*? result :*/ || '';

              document.querySelector('#score').innerText = score.displayScore();


            //previous method, 
            //    console.log(score);
            //   alert(`You have chosen ${userMove}, Computer choice is ${computerMove} and ${result}
              
            //   ${score.displayScore()}`); 
        }
    </script>
</body>
</html>
