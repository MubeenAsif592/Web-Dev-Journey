<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Variable Practice</title>
</head>
<body>
     <button id="bag" onclick= "cartQuantity++;
      document.querySelector('#cart-summary').innerText = `Your Bag has ${cartQuantity}  items`;
     ">Add to bag</button>

    <button id="wishlist" onclick="cartQuantity--;
    document.querySelector('#cart-summary').innerText = `Your Bag has ${cartQuantity}  items`;">Move to Wishlist</button>
    
    <button id="bag" onclick="cartQuantity += 2;
    document.querySelector('#cart-summary').innerText = `Your Bag has ${cartQuantity}  items`;">Adding 1+1 Sale button</button>
    
    <h1 id="cart-summary"></h1>
    <script>;
        let cartQuantity = 0;
        document.querySelector('#cart-summary').innerText = `Your Bag has ${cartQuantity}  items`;
    </script>
</body> 
</html>
