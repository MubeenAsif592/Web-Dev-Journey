<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
    <style>
        .btn{
            height: 30px;
            width: 80px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 10px;
        }
        .double-click{
            height: 60px;
            width: 160px;
            background-color: blue;
            color: white;
        }
        
    </style>
</head>
<body>
        <button class="btn" onclick="setTimeout(doubleClick,2000);">Click</button>

    <script>
       
        //1st task
        let multiply = function (num1, num2){
            return num1*num2;
        }
        console.log(multiply(5,6));
        //2nd task
        let printGreeting = () => console.log('Good Morning');
        let runTwice = inputFunction => {
            inputFunction();
            inputFunction();
        }
        console.log(runTwice(printGreeting));

         //3rd task
        function doubleClick(){
            let buttonElement = document.querySelector('.btn');
            buttonElement.classList.add('double-click');
        }
        
        //4th task
        let arr = [1,2,3,4,5,6,7,8];
        let sum = 0;
        arr.forEach(num => sum +=num);
        console.log(sum);

        //5th
        let squares = arr.map(num => num * num);
        console.log(squares);

    </script>
</body>
</html>
